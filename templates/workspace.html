<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge Vortex | Student Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 🛡️ THE BOUNCER: Security & Role Routing
        if (!localStorage.getItem('vortex_token')) {
            window.location.href = "/login/";
        } else if (localStorage.getItem('vortex_is_teacher') === 'true') {
            window.location.href = "/teacher-dashboard/";
        }
    </script>
    
    <script type="importmap">
    {
      "imports": {
        "@codemirror/state": "https://esm.sh/@codemirror/state",
        "@codemirror/view": "https://esm.sh/@codemirror/view",
        "@codemirror/commands": "https://esm.sh/@codemirror/commands",
        "@codemirror/language": "https://esm.sh/@codemirror/language",
        "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete",
        "codemirror": "https://esm.sh/codemirror",
        "@codemirror/lang-python": "https://esm.sh/@codemirror/lang-python",
        "@codemirror/lang-cpp": "https://esm.sh/@codemirror/lang-cpp",
        "@codemirror/lang-java": "https://esm.sh/@codemirror/lang-java",
        "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript",
        "@codemirror/lang-rust": "https://esm.sh/@codemirror/lang-rust",
        "@codemirror/lang-php": "https://esm.sh/@codemirror/lang-php",
        "@codemirror/lang-go": "https://esm.sh/@codemirror/lang-go",
        "@codemirror/lang-sql": "https://esm.sh/@codemirror/lang-sql",
        "@codemirror/legacy-modes/mode/ruby": "https://esm.sh/@codemirror/legacy-modes/mode/ruby",
        "@codemirror/legacy-modes/mode/swift": "https://esm.sh/@codemirror/legacy-modes/mode/swift",
        "@codemirror/legacy-modes/mode/haskell": "https://esm.sh/@codemirror/legacy-modes/mode/haskell",
        "@codemirror/legacy-modes/mode/clike": "https://esm.sh/@codemirror/legacy-modes/mode/clike"
      }
    }
    </script>

    <style>
        /* Light Theme Custom Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f9fafb; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Resizer Gutters */
        .gutter-h { cursor: col-resize; width: 6px; background: transparent; transition: background 0.2s; z-index: 50; }
        .gutter-h:hover, .gutter-h.active { background: #3b82f6; }
        
        .gutter-v { cursor: row-resize; height: 6px; background: transparent; transition: background 0.2s; z-index: 50; }
        .gutter-v:hover, .gutter-v.active { background: #3b82f6; }
        .resizing { user-select: none; pointer-events: none; }

        /* CodeMirror Specific Styling (Light Theme) */
        .cm-editor { height: 100%; width: 100%; outline: none !important; font-size: 15px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; background-color: #ffffff; }
        .cm-scroller { overflow: auto; }
        .cm-focused { outline: none !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen flex flex-col font-sans overflow-hidden">

    <nav class="bg-white border-b border-gray-200 p-3 flex justify-between items-center z-30 shrink-0 shadow-sm">
        <button id="joinRoomBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md transition mr-2 flex items-center">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
            Join Exam
        </button>
        <div class="flex items-center space-x-3">
            <h1 class="text-xl font-black text-blue-600 tracking-tight">Judge Vortex</h1>
            <span class="bg-blue-50 text-[10px] px-2 py-1 rounded text-blue-600 border border-blue-200 uppercase tracking-tighter font-bold">Student View</span>
        </div>
        
        <div class="flex items-center space-x-4">
            <select id="language" class="bg-white text-gray-700 text-sm px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 shadow-sm">
                <option value="python">Python 3.11</option>
                <option value="cpp">C++ (GCC)</option>
                <option value="c">C (GCC)</option>
                <option value="java">Java 17</option>
                <option value="javascript">JavaScript (Node 18)</option>
                <option value="typescript">TypeScript (Node 18)</option>
                <option value="ruby">Ruby 3.2</option>
                <option value="go">Go 1.21</option>
                <option value="rust">Rust 1.75</option>
                <option value="php">PHP 8.2</option>
                <option value="csharp">C# (.NET 8.0)</option>
                <option value="swift">Swift (Latest)</option>
                <option value="haskell">Haskell 9.4</option>
                <option value="sql">SQL (SQLite)</option>
            </select>
            
            <button id="runBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-md transition flex items-center">
                <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" fill-rule="evenodd"></path></svg>
                Run Code
            </button>
            <button id="logoutBtn" class="text-gray-500 hover:text-red-500 text-sm font-semibold transition px-2">Log Out</button>
        </div>
    </nav>

    <div class="flex-1 flex overflow-hidden w-full">
        
        <div id="leftPanel" class="flex flex-col min-w-[200px]" style="width: 60%;">
            
            <div id="editorTop" class="flex-1 relative bg-white overflow-hidden border-r border-gray-200">
                <div id="editorContainer" class="absolute inset-0"></div>
            </div>

            <div id="gutterV" class="gutter-v shrink-0 border-y border-gray-200 bg-gray-50"></div>

            <div id="inputBottom" class="bg-gray-50 p-3 flex flex-col shrink-0 border-r border-gray-200" style="height: 180px;">
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Standard Input (stdin)</label>
                <textarea id="customInput" placeholder="Enter test case inputs here..." 
                    class="flex-1 w-full bg-white border border-gray-300 rounded p-3 font-mono text-sm text-gray-800 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 box-border resize-none transition shadow-sm"></textarea>
            </div>
        </div>

        <div id="gutterH" class="gutter-h shrink-0 border-x border-gray-200 bg-gray-50"></div>

        <div id="rightPanel" class="flex-1 min-w-[300px] flex flex-col bg-white">
            <div class="bg-gray-50 flex border-b border-gray-200 shrink-0 sticky top-0 z-20">
                <button id="tab-console" class="flex-1 px-5 py-3 text-xs font-bold text-blue-600 border-b-2 border-blue-600 uppercase tracking-widest bg-white focus:outline-none">Output</button>
                <button id="tab-history" class="flex-1 px-5 py-3 text-xs font-bold text-gray-500 hover:text-gray-700 uppercase tracking-widest transition focus:outline-none border-b-2 border-transparent bg-gray-50">History</button>
                <button id="tab-exam" class="hidden flex-1 px-5 py-3 text-xs font-bold text-purple-600 hover:text-purple-700 uppercase tracking-widest transition focus:outline-none border-b-2 border-transparent bg-gray-50">Exam Qs</button>
            </div>
            
            <div class="flex-1 relative overflow-hidden">
                <div id="terminal" class="absolute inset-0 p-5 overflow-y-auto font-mono text-sm leading-relaxed block bg-white">
                    <div class="text-gray-400 italic">Ready. Awaiting execution...</div>
                </div>

                <div id="historyPanel" class="absolute inset-0 overflow-y-auto hidden bg-white">
                    <div id="historyList" class="divide-y divide-gray-200 flex flex-col"></div>
                </div>
                <div id="examPanel" class="absolute inset-0 overflow-y-auto hidden bg-white p-6">
                    <h2 id="examTitle" class="text-xl font-black text-gray-800 mb-4 border-b pb-2">Exam Mode Active</h2>
                    <div id="examQuestionsList" class="space-y-6">
                        <p class="text-gray-400 text-sm italic">Join a room to view your assigned questions.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="joinRoomModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center hidden z-50 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm border border-gray-200">
            <h2 class="text-2xl font-bold mb-4 text-gray-800">Join Exam Room</h2>
            <form id="joinRoomForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Enter 6-Digit Room Code</label>
                    <input type="text" id="roomCodeInput" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none uppercase font-mono text-center text-2xl tracking-[0.5em]" placeholder="XXXXXX" maxlength="6" required>
                </div>
                <div id="joinErrorMsg" class="text-red-600 text-sm hidden bg-red-50 p-2 rounded border border-red-200 text-center"></div>
                <div class="flex justify-end space-x-3 mt-6">
                    <button type="button" onclick="document.getElementById('joinRoomModal').classList.add('hidden')" class="px-4 py-2 text-gray-600 font-bold hover:bg-gray-100 rounded-lg">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-purple-600 text-white font-bold rounded-lg hover:bg-purple-700 shadow-md">Join</button>
                </div>
            </form>
        </div>
    </div>
    <script type="module">
        import { basicSetup } from "codemirror";
        import { EditorView, keymap } from "@codemirror/view";
        import { EditorState, Compartment } from "@codemirror/state";
        import { indentWithTab } from "@codemirror/commands";
        
        import { StreamLanguage } from "@codemirror/language";
        import { python } from "@codemirror/lang-python";
        import { cpp } from "@codemirror/lang-cpp";
        import { java } from "@codemirror/lang-java";
        import { javascript } from "@codemirror/lang-javascript";
        import { rust } from "@codemirror/lang-rust";
        import { php } from "@codemirror/lang-php";
        import { go } from "@codemirror/lang-go";
        import { sql } from "@codemirror/lang-sql"; // 🟢 SQL added here
        import { ruby } from "@codemirror/legacy-modes/mode/ruby";
        import { swift } from "@codemirror/legacy-modes/mode/swift";
        import { haskell } from "@codemirror/legacy-modes/mode/haskell";
        import { csharp } from "@codemirror/legacy-modes/mode/clike";

        const token = localStorage.getItem('vortex_token');
        const userId = localStorage.getItem('vortex_user_id');

        document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); window.location.href = '/login/'; };

        const boilerplate = {
            'python': 'def solve():\n    print("Hello from Judge Vortex!")\n\nif __name__ == "__main__":\n    solve()',
            'cpp': '#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "Hello from Judge Vortex!\\n";\n    return 0;\n}',
            'c': '#include <stdio.h>\n\nint main() {\n    printf("Hello from Judge Vortex!\\n");\n    return 0;\n}',
            'java': 'import java.util.Scanner;\n\npublic class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello from Judge Vortex!");\n    }\n}',
            'javascript': 'console.log("Hello from Judge Vortex!");',
            'typescript': 'const message: string = "Hello from Judge Vortex!";\nconsole.log(message);',
            'ruby': 'puts "Hello from Judge Vortex!"',
            'go': 'package main\n\nimport "fmt"\n\nfunc main() {\n\tfmt.Println("Hello from Judge Vortex!")\n}',
            'rust': 'fn main() {\n    println!("Hello from Judge Vortex!");\n}',
            'php': '<?php\n\necho "Hello from Judge Vortex!\\n";\n?>',
            'csharp': 'using System;\n\nnamespace JudgeVortex {\n    class Program {\n        static void Main(string[] args) {\n            Console.WriteLine("Hello from Judge Vortex!");\n        }\n    }\n}',
            'swift': 'print("Hello from Judge Vortex!")',
            'haskell': 'main :: IO ()\nmain = putStrLn "Hello from Judge Vortex!"',
            'sql': '-- Write your query here\nSELECT "Hello from Judge Vortex!" AS Welcome;'
        };

        const languageConf = new Compartment();
        const getLangExtension = (langStr) => {
            switch(langStr) {
                case 'python': return python();
                case 'cpp': case 'c': return cpp();
                case 'java': return java();
                case 'javascript': case 'typescript': return javascript();
                case 'rust': return rust();
                case 'php': return php();
                case 'go': return go();
                case 'sql': return sql(); // 🟢 SQL registered in the router
                case 'ruby': return StreamLanguage.define(ruby);
                case 'swift': return StreamLanguage.define(swift);
                case 'haskell': return StreamLanguage.define(haskell);
                case 'csharp': return StreamLanguage.define(csharp);
                default: return python(); 
            }
        };

        const initialLang = document.getElementById('language').value;
        const editorView = new EditorView({
            state: EditorState.create({
                doc: boilerplate[initialLang] || boilerplate['python'],
                extensions: [
                    basicSetup,
                    keymap.of([indentWithTab]),
                    languageConf.of(getLangExtension(initialLang))
                ]
            }),
            parent: document.getElementById('editorContainer')
        });

        document.getElementById('language').addEventListener('change', (e) => {
            const lang = e.target.value;
            editorView.dispatch({ effects: languageConf.reconfigure(getLangExtension(lang)) });

            const cur = editorView.state.doc.toString();
            const clean = (s) => s.replace(/\s+/g, ''); 
            const isUntouchedBoilerplate = Object.values(boilerplate).some(bp => clean(bp) === clean(cur));
            
            if (isUntouchedBoilerplate || clean(cur) === '') {
                editorView.dispatch({ changes: {from: 0, to: editorView.state.doc.length, insert: boilerplate[lang]} });
            } else {
                if (confirm(`Overwrite custom code with the default ${lang} template?`)) {
                    editorView.dispatch({ changes: {from: 0, to: editorView.state.doc.length, insert: boilerplate[lang]} });
                }
            }
        });

        // --- Resizing Engine ---
        const leftPanel = document.getElementById('leftPanel');
        const gutterH = document.getElementById('gutterH');
        const editorTop = document.getElementById('editorTop');
        const inputBottom = document.getElementById('inputBottom');
        const gutterV = document.getElementById('gutterV');

        let isResizingH = false; let isResizingV = false;

        gutterH.addEventListener('mousedown', () => { isResizingH = true; gutterH.classList.add('active'); document.body.classList.add('resizing'); });
        gutterV.addEventListener('mousedown', () => { isResizingV = true; gutterV.classList.add('active'); document.body.classList.add('resizing'); });

        document.addEventListener('mousemove', (e) => {
            if (isResizingH) {
                const newWidth = (e.clientX / window.innerWidth) * 100;
                if (newWidth > 20 && newWidth < 85) leftPanel.style.width = `${newWidth}%`;
            }
            if (isResizingV) {
                const offsetTop = editorTop.getBoundingClientRect().top;
                const newHeight = e.clientY - offsetTop;
                if (newHeight > 100 && (window.innerHeight - e.clientY) > 80) {
                    inputBottom.style.height = `${window.innerHeight - e.clientY - 20}px`;
                }
            }
        });
        document.addEventListener('mouseup', () => { isResizingH = false; isResizingV = false; gutterH.classList.remove('active'); gutterV.classList.remove('active'); document.body.classList.remove('resizing'); });

        // --- 🟢 Clean Output Rendering ---
        const terminalEl = document.getElementById('terminal');

        const wsProtocol = window.location.protocol === "https:" ? "wss://" : "ws://";
        const socket = new WebSocket(`${wsProtocol}${window.location.host}/ws/submissions/${userId}/`);
        
        socket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const isSuccess = data.status === "SUCCESS";
            
            // Raw string sanitization
            const safeText = data.output ? data.output.trim().replace(/</g, "&lt;").replace(/>/g, "&gt;") : "(No output)";
            
            // Simple color coding: Green for success, Red for any error
            const textColor = isSuccess ? 'text-green-600' : 'text-red-600';
            const statusLabel = `<div class="font-bold mb-2 text-xs uppercase tracking-wider ${textColor}">${data.status}</div>`;
            
            // Clean unboxed output
            terminalEl.innerHTML = `
                ${statusLabel}
                <pre class="${textColor} whitespace-pre-wrap break-all m-0 p-0 text-left leading-relaxed">${safeText}</pre>
            `;
        };

        document.getElementById('runBtn').onclick = async () => {
            tabConsole.click(); 
            terminalEl.innerHTML = '<div class="text-blue-500 italic">Executing...</div>'; 
            const code = editorView.state.doc.toString();
            const lang = document.getElementById('language').value;
            const input = document.getElementById('customInput').value;
            
            try {
                await fetch('/api/submissions/submit/', {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Token ${token}` },
                    body: JSON.stringify({ 
                        code: code, 
                        language: lang, 
                        user_input: input, 
                        time_limit_ms: 60000,
                        room_id: activeExamRoomId,
                        question_id: activeExamQuestionId
                    })
                });
            } catch (err) { terminalEl.innerHTML = `<div class="text-red-600">API Error: ${err.message}</div>`; }
        };

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('runBtn').click();
            }
        });

        // --- Tabs & History ---
        const tabConsole = document.getElementById('tab-console');
        const tabHistory = document.getElementById('tab-history');
        const historyPanel = document.getElementById('historyPanel');
        let submissionCache = {};

        tabConsole.onclick = () => { tabConsole.className = "flex-1 px-5 py-3 text-xs font-bold text-blue-600 border-b-2 border-blue-600 uppercase tracking-widest bg-white focus:outline-none"; tabHistory.className = "flex-1 px-5 py-3 text-xs font-bold text-gray-500 hover:text-gray-700 uppercase tracking-widest transition focus:outline-none border-b-2 border-transparent bg-gray-50"; terminalEl.classList.remove('hidden'); historyPanel.classList.add('hidden'); };
        tabHistory.onclick = () => { tabHistory.className = "flex-1 px-5 py-3 text-xs font-bold text-blue-600 border-b-2 border-blue-600 uppercase tracking-widest bg-white focus:outline-none"; tabConsole.className = "flex-1 px-5 py-3 text-xs font-bold text-gray-500 hover:text-gray-700 uppercase tracking-widest transition focus:outline-none border-b-2 border-transparent bg-gray-50"; historyPanel.classList.remove('hidden'); terminalEl.classList.add('hidden'); fetchHistory(); };

        async function fetchHistory() {
            const listEl = document.getElementById('historyList');
            listEl.innerHTML = '<div class="p-6 text-center text-gray-400 animate-pulse text-xs">Loading history...</div>';
            try {
                const res = await fetch('/api/submissions/', { headers: { 'Authorization': `Token ${token}` }});
                const data = await res.json();
                listEl.innerHTML = '';
                submissionCache = {};
                
                (Array.isArray(data) ? data : data.results || []).forEach(sub => {
                    const statusColor = sub.status === "SUCCESS" ? "text-green-600" : "text-red-600";
                    submissionCache[sub.id] = sub;

                    listEl.innerHTML += `
                    <div data-id="${sub.id}" class="history-row p-4 hover:bg-gray-50 border-l-4 ${sub.status === "SUCCESS" ? 'border-green-500' : 'border-red-500'} group relative cursor-pointer transition-colors">
                        <div class="flex justify-between mb-1">
                            <span class="font-bold text-xs ${statusColor}">${sub.status}</span>
                            <span class="text-[10px] text-gray-400 font-mono">${new Date(sub.submitted_at).toLocaleString()}</span>
                        </div>
                        <div class="flex justify-between items-center text-xs">
                            <div class="flex space-x-2">
                                <span class="text-blue-600 font-mono font-bold">${sub.language}</span>
                                <span class="text-gray-500 font-mono">${sub.execution_time_ms || 0}ms</span>
                            </div>
                            <button data-del="${sub.id}" class="del-btn text-gray-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-opacity">
                                <svg class="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>`;
                });

                document.querySelectorAll('.history-row').forEach(row => { row.onclick = () => loadPastCode(row.getAttribute('data-id')); });
                document.querySelectorAll('.del-btn').forEach(btn => { btn.onclick = (e) => { e.stopPropagation(); deleteSubmission(btn.getAttribute('data-del')); }; });

            } catch(e) { listEl.innerHTML = '<div class="p-6 text-red-500 text-center text-xs">Error loading history.</div>'; }
        }

        function loadPastCode(id) {
            const sub = submissionCache[id];
            if (!sub || !sub.code) return;
            const langDropdown = document.getElementById('language');
            langDropdown.value = sub.language;
            editorView.dispatch({ effects: languageConf.reconfigure(getLangExtension(sub.language)) });
            editorView.dispatch({ changes: {from: 0, to: editorView.state.doc.length, insert: sub.code} });
            tabConsole.click();
        }

        async function deleteSubmission(id) {
            if (confirm("Delete record?")) { 
                await fetch(`/api/submissions/${id}/delete/`, { method: 'DELETE', headers: { 'Authorization': `Token ${token}` }}); 
                fetchHistory(); 
            }
        }

        // ==========================================
        // 🟢 EXAM ROOM LOGIC
        // ==========================================
        const tabExam = document.getElementById('tab-exam');
        const examPanel = document.getElementById('examPanel');
        let activeExamRoomId = null;
        let activeExamQuestionId = null;

        // Modal Toggles
        document.getElementById('joinRoomBtn').onclick = () => {
            document.getElementById('joinErrorMsg').classList.add('hidden');
            document.getElementById('joinRoomModal').classList.remove('hidden');
        };

        // Handle Tab Clicks (Update your existing tab logic to include the Exam Tab)
        tabExam.onclick = () => {
            tabExam.className = "flex-1 px-5 py-3 text-xs font-bold text-purple-600 border-b-2 border-purple-600 uppercase tracking-widest bg-white focus:outline-none";
            tabConsole.className = tabHistory.className = "flex-1 px-5 py-3 text-xs font-bold text-gray-500 hover:text-gray-700 uppercase tracking-widest transition focus:outline-none border-b-2 border-transparent bg-gray-50";
            examPanel.classList.remove('hidden');
            terminalEl.classList.add('hidden');
            historyPanel.classList.add('hidden');
        };

        // Handle Join Submission
        document.getElementById('joinRoomForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('roomCodeInput').value.toUpperCase();
            const errorMsg = document.getElementById('joinErrorMsg');

            try {
                const res = await fetch('/api/rooms/join/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Token ${token}` },
                    body: JSON.stringify({ room_code: code })
                });
                const data = await res.json();

                if (res.ok) {
                    document.getElementById('joinRoomModal').classList.add('hidden');
                    tabExam.classList.remove('hidden'); // Un-hide the tab
                    
                    // Populate the questions
                    document.getElementById('examTitle').innerText = `Exam: ${data.room_title}`;
                    const qList = document.getElementById('examQuestionsList');
                    qList.innerHTML = '';

                    data.assigned_questions.forEach((q, index) => {
                        qList.innerHTML += `
                            <div class="border border-gray-200 p-5 rounded-lg bg-gray-50 shadow-sm relative">
                                <span class="absolute top-4 right-4 bg-purple-100 text-purple-700 text-[10px] font-bold px-2 py-1 rounded uppercase">Q${index + 1}</span>
                                <h3 class="font-bold text-lg text-blue-600 mb-2 pr-8">${q.title}</h3>
                                <p class="text-sm text-gray-700 font-mono whitespace-pre-wrap bg-white p-3 rounded border border-gray-100 mb-3">${q.description}</p>
                                <button onclick="window.setActiveQuestion(${q.id}, ${q.room}, this)" class="bg-blue-100 hover:bg-blue-200 text-blue-700 text-xs px-4 py-2 rounded-lg font-bold transition w-full text-center border border-blue-200">
                                    Lock In & Solve This Question
                                </button>
                            </div>
                        `;
                    });
                    
                    tabExam.click(); // Auto-switch to the exam tab
                    alert(`Success! You have entered the exam.`);
                } else {
                    errorMsg.innerText = data.error || "Failed to join room.";
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.innerText = "Network Error.";
                errorMsg.classList.remove('hidden');
            }
        });

        // Function to lock in which question the student is currently solving
        window.setActiveQuestion = (qId, roomId, btnElement) => {
            activeExamQuestionId = qId;
            activeExamRoomId = roomId;
            
            // UI Feedback: Reset all buttons, highlight the active one
            document.querySelectorAll('#examQuestionsList button').forEach(b => {
                b.innerText = "Lock In & Solve This Question";
                b.className = "bg-blue-100 hover:bg-blue-200 text-blue-700 text-xs px-4 py-2 rounded-lg font-bold transition w-full text-center border border-blue-200";
            });
            
            btnElement.innerText = "Currently Solving...";
            btnElement.className = "bg-green-600 text-white text-xs px-4 py-2 rounded-lg font-bold transition w-full text-center shadow-md shadow-green-600/20";
            
            alert(`Your code executions will now be submitted against this question!`);
        };
    </script>
</body>
</html>
