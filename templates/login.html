<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // THE BOUNCER: Route based on role
        if (localStorage.getItem('vortex_token')) {
            if (localStorage.getItem('vortex_is_teacher') === 'true') {
                window.location.href = "/teacher-dashboard/";
            } else {
                window.location.href = "/workspace/";
            }
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge Vortex | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 h-screen flex items-center justify-center font-sans">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-200">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-blue-600 tracking-tight">Judge Vortex</h1>
            <p class="text-gray-500 mt-2 text-sm">Academic Assessment Platform</p>
        </div>
        
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                <input type="text" id="username" class="w-full p-3 bg-gray-50 rounded-lg border border-gray-300 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" class="w-full p-3 bg-gray-50 rounded-lg border border-gray-300 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition" required>
            </div>
            <div id="errorMsg" class="text-red-600 text-sm hidden bg-red-50 p-2 rounded border border-red-200 text-center">
                Invalid credentials or server offline.
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg font-bold transition duration-200 shadow-md">
                Secure Login
            </button>
        </form>
        <p class="mt-6 text-center text-sm text-gray-500">
            Don't have an account? <a href="/register/" class="text-blue-600 hover:text-blue-500 font-bold transition">Sign up here</a>
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const response = await fetch('/api/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Save auth data and role
                    localStorage.setItem('vortex_token', data.token);
                    localStorage.setItem('vortex_user_id', data.user_id);
                    localStorage.setItem('vortex_is_teacher', data.is_teacher); // Store the role!
                    
                    // Route based on role
                    if (data.is_teacher) {
                        window.location.href = '/teacher-dashboard/';
                    } else {
                        window.location.href = '/workspace/'; 
                    }
                } else {
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.innerText = "Network Error. Is the Django server running?";
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
