<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // THE BOUNCER: Route users based on their stored role
        if (localStorage.getItem('vortex_token')) {
            if (localStorage.getItem('vortex_is_teacher') === 'true') {
                window.location.href = "/teacher-dashboard/";
            } else {
                window.location.href = "/workspace/";
            }
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge Vortex | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 h-screen flex items-center justify-center font-sans">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-200">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-blue-600 tracking-tight">Join Vortex</h1>
            <p class="text-gray-500 mt-2 text-sm">Academic Assessment Platform</p>
        </div>
        
        <form id="registerForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Choose a Username</label>
                <input type="text" id="username" class="w-full p-3 bg-gray-50 rounded-lg border border-gray-300 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Create a Password</label>
                <input type="password" id="password" class="w-full p-3 bg-gray-50 rounded-lg border border-gray-300 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition" required>
            </div>
            
            <div class="flex items-center bg-blue-50 p-3 rounded-lg border border-blue-100">
                <input type="checkbox" id="isTeacher" class="w-5 h-5 text-blue-600 bg-white border-gray-300 rounded focus:ring-blue-500">
                <label for="isTeacher" class="ml-3 text-sm font-medium text-blue-900">
                    I am a Teacher (Create Exam Rooms)
                </label>
            </div>

            <div id="errorMsg" class="text-red-600 text-sm hidden bg-red-50 p-2 rounded border border-red-200 text-center"></div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg font-bold transition duration-200 shadow-md">
                Create Account
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-500">
            Already have an account? <a href="/login/" class="text-blue-600 hover:text-blue-500 font-bold transition">Log in here</a>
        </p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const isTeacher = document.getElementById('isTeacher').checked; // Grab the checkbox state
            const errorMsg = document.getElementById('errorMsg');

            try {
                const response = await fetch('/api/register/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, is_teacher: isTeacher }) // Send boolean to API
                });

                const data = await response.json();

                if (response.ok) {
                    // Save credentials and role
                    localStorage.setItem('vortex_token', data.token);
                    localStorage.setItem('vortex_user_id', data.user_id);
                    localStorage.setItem('vortex_is_teacher', data.is_teacher);
                    
                    // Route immediately based on role
                    if (data.is_teacher) {
                        window.location.href = '/teacher-dashboard/';
                    } else {
                        window.location.href = '/workspace/'; 
                    }
                } else {
                    errorMsg.innerText = data.error || "Registration failed.";
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.innerText = "Network Error.";
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
