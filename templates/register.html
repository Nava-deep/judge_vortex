<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // THE BOUNCER: Route users based on their stored role
        if (localStorage.getItem('vortex_token')) {
            if (localStorage.getItem('vortex_is_teacher') === 'true') {
                window.location.href = "/teacher-dashboard/";
            } else {
                window.location.href = "/workspace/";
            }
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge Vortex | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#0b1220] text-gray-900 flex items-center justify-center font-sans overflow-hidden relative px-6 py-10">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,_rgba(59,130,246,0.24),_transparent_32%),radial-gradient(circle_at_bottom_right,_rgba(147,51,234,0.20),_transparent_30%),linear-gradient(135deg,_#0b1220,_#111827_55%,_#0f172a)]"></div>
    <div class="absolute top-[-8rem] left-[-4rem] h-72 w-72 rounded-full bg-blue-500/20 blur-3xl"></div>
    <div class="absolute bottom-[-6rem] right-[-2rem] h-72 w-72 rounded-full bg-violet-500/20 blur-3xl"></div>

    <div class="relative z-10 bg-white/92 backdrop-blur-xl p-8 rounded-[30px] shadow-[0_30px_120px_-40px_rgba(37,99,235,0.55)] w-full max-w-md border border-white/60">
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 rounded-full border border-violet-100 bg-violet-50 px-4 py-1.5 text-[11px] font-black uppercase tracking-[0.24em] text-violet-700 shadow-sm">
                New Account
            </div>
            <h1 class="mt-5 text-4xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-600 via-indigo-600 to-violet-600">Join Vortex</h1>
            <p class="text-gray-500 mt-2 text-sm">Create a student or teacher profile to enter the platform</p>
        </div>
        
        <form id="registerForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Choose a Username</label>
                <input type="text" id="username" class="w-full p-3.5 bg-slate-50 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition shadow-sm" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Create a Password</label>
                <input type="password" id="password" class="w-full p-3.5 bg-slate-50 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition shadow-sm" required>
            </div>
            
            <div class="flex items-center bg-gradient-to-r from-blue-50 to-violet-50 p-3.5 rounded-xl border border-blue-100 shadow-sm">
                <input type="checkbox" id="isTeacher" class="w-5 h-5 text-blue-600 bg-white border-gray-300 rounded focus:ring-blue-500">
                <label for="isTeacher" class="ml-3 text-sm font-medium text-blue-900">
                    I am a Teacher (Create Exam Rooms)
                </label>
            </div>

            <div id="errorMsg" class="text-red-600 text-sm hidden bg-red-50 p-3 rounded-xl border border-red-200 text-center"></div>
            
            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 via-blue-600 to-violet-600 hover:brightness-110 text-white p-3.5 rounded-xl font-bold transition duration-200 shadow-[0_18px_40px_-18px_rgba(59,130,246,0.9)]">
                Create Account
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-500">
            Already have an account? <a href="/login/" class="text-blue-600 hover:text-blue-500 font-bold transition">Log in here</a>
        </p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const isTeacher = document.getElementById('isTeacher').checked; // Grab the checkbox state
            const errorMsg = document.getElementById('errorMsg');

            try {
                const response = await fetch('/api/register/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, is_teacher: isTeacher }) // Send boolean to API
                });

                const data = await response.json();

                if (response.ok) {
                    // Save credentials and role
                    localStorage.setItem('vortex_token', data.token);
                    localStorage.setItem('vortex_user_id', data.user_id);
                    localStorage.setItem('vortex_is_teacher', data.is_teacher);
                    
                    // Route immediately based on role
                    if (data.is_teacher) {
                        window.location.href = '/teacher-dashboard/';
                    } else {
                        window.location.href = '/workspace/'; 
                    }
                } else {
                    errorMsg.innerText = data.error || "Registration failed.";
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.innerText = "Network Error.";
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
