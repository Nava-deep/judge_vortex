<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // THE BOUNCER: If you have a token, go straight to the workspace!
        if (localStorage.getItem('vortex_token')) {
            window.location.href = "{% url 'workspace_page' %}";
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge Vortex | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white h-screen flex items-center justify-center font-sans">

    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-700">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500 tracking-tight">Join Vortex</h1>
            <p class="text-gray-400 mt-2 text-sm">Create your sandbox account</p>
        </div>
        
        <form id="registerForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-1">Choose a Username</label>
                <input type="text" id="username" class="w-full p-3 bg-gray-900 rounded-lg border border-gray-600 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-1">Create a Password</label>
                <input type="password" id="password" class="w-full p-3 bg-gray-900 rounded-lg border border-gray-600 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition" required>
            </div>
            <div id="errorMsg" class="text-red-400 text-sm hidden bg-red-900/30 p-2 rounded border border-red-800 text-center"></div>
            
            <button type="submit" class="w-full bg-green-600 hover:bg-green-500 p-3 rounded-lg font-bold transition duration-200 shadow-lg shadow-green-600/30">
                Register & Enter Workspace
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-400">
            Already have an account? <a href="/login/" class="text-blue-400 hover:text-blue-300 font-bold transition">Log in here</a>
        </p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const response = await fetch('/api/register/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Save token and jump straight into the IDE
                    localStorage.setItem('vortex_token', data.token);
                    localStorage.setItem('vortex_user_id', data.user_id);
                    window.location.href = '/workspace/'; 
                } else {
                    errorMsg.innerText = data.error || "Registration failed.";
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.innerText = "Network Error.";
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
