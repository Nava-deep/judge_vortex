# infrastructure/docker-compose.monitor.yml
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: vortex-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090" # Host 9090 -> Container 9090
    extra_hosts:
      # This allows Prometheus to scrape Django (53562) and Executor (8001) on your Mac
      - "host.docker.internal:host-gateway"
    networks:
      - vortex-net

  grafana:
    image: grafana/grafana:latest
    container_name: vortex-grafana
    ports:
      - "3000:3000" # Host 3000 -> Container 3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    volumes:
      # Optional but recommended: Keeps your dashboards from wiping on restart
      - grafana_data:/var/lib/grafana
    networks:
      - vortex-net

volumes:
  grafana_data:

networks:
  vortex-net:
    # We use 'external' here so it connects to the bridge created by the Core file
    external: true
    name: vortex-bridge