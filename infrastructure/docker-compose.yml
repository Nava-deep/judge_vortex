# infrastructure/docker-compose.yml
services:
  db:
    image: postgres:13
    container_name: vortex-postgres
    environment:
      POSTGRES_DB: judge_vortex_db
      POSTGRES_USER: vortex_admin
      POSTGRES_PASSWORD: supersecretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vortex-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: vortex-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - vortex-net

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: vortex-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Advanced Listener config ensures the Mac host AND Docker containers can both connect
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - vortex-net
  
  redis:
    image: redis:6.2-alpine
    container_name: vortex-redis
    ports:
      - "6379:6379"
    networks:
      - vortex-net
  
  nginx:
    image: nginx:alpine
    container_name: vortex-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - db
      - kafka
    networks:
      - vortex-net

volumes:
  postgres_data:

networks:
  vortex-net:
    name: vortex-bridge
    external: true
    driver: bridge