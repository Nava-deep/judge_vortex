x-executor-common: &executor-common
  build:
    context: ..
    dockerfile: executor_service/Dockerfile
  depends_on:
    - kafka
  environment: &executor-common-env
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    CORE_API_URL: ${CORE_API_URL:-http://host.docker.internal:53562/api}
    EXECUTOR_BACKEND: ${EXECUTOR_BACKEND:-isolate}
    EXECUTOR_MAX_CONCURRENCY: ${EXECUTOR_MAX_CONCURRENCY:-2}
    EXECUTOR_MEMORY_BYTES: ${EXECUTOR_MEMORY_BYTES:-268435456}
    EXECUTOR_COMPILE_MEMORY_BYTES: ${EXECUTOR_COMPILE_MEMORY_BYTES:-536870912}
    EXECUTOR_MAX_OUTPUT_KB: ${EXECUTOR_MAX_OUTPUT_KB:-1024}
    ISOLATE_BOXES: ${ISOLATE_BOXES:-32}
  extra_hosts:
    - "host.docker.internal:host-gateway"
  privileged: true
  restart: unless-stopped
  networks:
    - vortex-net

services:
  db:
    image: postgres:13
    container_name: vortex-postgres
    environment:
      POSTGRES_DB: judge_vortex_db
      POSTGRES_USER: vortex_admin
      POSTGRES_PASSWORD: supersecretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vortex-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: vortex-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - vortex-net

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: vortex-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_NUM_PARTITIONS: ${KAFKA_SUBMISSIONS_TOPIC_PARTITIONS:-8}
    networks:
      - vortex-net

  executor-core:
    <<: *executor-common
    build:
      context: ..
      dockerfile: executor_service/Dockerfile
      target: executor-core
    environment:
      <<: *executor-common-env
      EXECUTOR_NAME: executor-core
      EXECUTOR_PROMETHEUS_PORT: 8001
      EXECUTOR_SUPPORTED_LANGUAGES: python,javascript,ruby,php,cpp,c,go,rust,typescript,sql
      KAFKA_SUBMISSIONS_TOPIC: ${KAFKA_SUBMISSIONS_TOPIC_CORE:-code_submissions_core}
      KAFKA_EXECUTOR_GROUP: ${KAFKA_EXECUTOR_GROUP_CORE:-judge_vortex_executor_core}

  executor-java:
    <<: *executor-common
    build:
      context: ..
      dockerfile: executor_service/Dockerfile
      target: executor-java
    environment:
      <<: *executor-common-env
      EXECUTOR_NAME: executor-java
      EXECUTOR_PROMETHEUS_PORT: 8002
      EXECUTOR_SUPPORTED_LANGUAGES: java
      KAFKA_SUBMISSIONS_TOPIC: ${KAFKA_SUBMISSIONS_TOPIC_JAVA:-code_submissions_java}
      KAFKA_EXECUTOR_GROUP: ${KAFKA_EXECUTOR_GROUP_JAVA:-judge_vortex_executor_java}

  redis:
    image: redis:6.2-alpine
    container_name: vortex-redis
    ports:
      - "6379:6379"
    networks:
      - vortex-net

  nginx:
    image: nginx:alpine
    container_name: vortex-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - db
      - kafka
    networks:
      - vortex-net

volumes:
  postgres_data:

networks:
  vortex-net:
    name: vortex-bridge
    external: true
    driver: bridge
