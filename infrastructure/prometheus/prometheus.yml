global:
  scrape_interval: 5s # Check for new data every 5 seconds

scrape_configs:
  - job_name: 'vortex-executors'
    static_configs:
      - targets:
          - 'executor-core:8001'
          - 'executor-java:8002'
          - 'executor-swift:8003'
          - 'executor-haskell:8004'
          - 'executor-csharp:8005'

  - job_name: 'vortex-api'
    static_configs:
      - targets: ['host.docker.internal:53562']
